version: '3.8'

services:
  app_web:
    build: .
    ports:
      - "8080:80"
    networks:
      - devops_net
    volumes:
      - devops_data:/var/log/nginx
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 3s
      retries: 3

  cache_redis:
    image: redis:alpine
    networks:
      - devops_net
    restart: unless-stopped

networks:
  devops_net:
    driver: bridge

volumes:
  devops_data: