name: DevOps CI-CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validar sintaxis de scripts Bash
        run: |
          bash -n setup.sh
          bash -n clean_logs.sh
          bash -n deploy.sh

      - name: Validar sintaxis de Python
        run: python -m py_compile aws_manager.py

      - name: Validar sintaxis de docker-compose
        run: docker-compose config

      - name: Construir imagenes Docker
        run: docker-compose build

      - name: Ejecutar contenedores y probar respuesta HTTP
        run: |
          docker-compose up -d
          sleep 5
          curl --fail http://localhost:8080 || exit 1
          docker-compose down
