name: DevOps CI-CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validar sintaxis de scripts Bash
        run: |
          bash -n setup.sh
          bash -n clean_logs.sh
          bash -n deploy.sh

      - name: Validar sintaxis de Python
        run: python -m py_compile aws_manager.py

      - name: Validar plantilla CloudFormation
        run: |
          aws cloudformation validate-template --template-body file://infra.yaml
        env:
          AWS_DEFAULT_REGION: us-east-1

      - name: Construir imagenes Docker (test)
        run: docker-compose build

      - name: Ejecutar contenedores y probar respuesta HTTP
        run: |
          docker-compose up -d
          sleep 5
          curl --fail http://localhost:8080 || exit 1
          docker-compose down

      - name: Copiar archivos a EC2 y desplegar
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: ".,!./.git"
          target: "/home/ubuntu/proyecto_docker"

      - name: Ejecutar despliegue remoto
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/proyecto_docker
            chmod +x deploy.sh
            ./deploy.sh